<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRC Lyrics Player</title>
<style>
:root {
    --bg: #000000;
    --fontSize: 42px;
    --lineHeight: 72px;
    --normal: #666666;
    --active: #ffffff;
}
* { box-sizing: border-box; }
html, body { width: 100%; height: 100%; margin: 0; }
body {
    background: var(--bg);
    color: white;
    overflow: hidden;
    font-family: sans-serif;
}
.toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 999;
    background: rgba(0,0,0,.8);
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
#lyricsContainer {
    position: absolute;
    inset: 0;
    overflow: hidden;
}
#lyrics {
    position: absolute;
    width: 100%;
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
}
.line {
    text-align: center;
    font-size: var(--fontSize);
    line-height: var(--lineHeight);
    color: var(--normal);
    opacity: 1;
    transition: .3s;
    padding: 2px 20px;
}
.active {
    color: var(--active);
    font-weight: bold;
    transform: scale(1.05);
}
audio {
    position: fixed;
    bottom: 15px;
    left: 15px;
    z-index: 999;
}
</style>
</head>
<body>

<div class="toolbar">
    <input type="file" id="audioFile" accept="audio/*">
    <input type="file" id="lrcFile" accept=".lrc">
    <input type="file" id="fontFile" accept=".ttf,.otf,.woff,.woff2">
    <label>字體大小 <input type="range" id="fontSize" min="20" max="80" value="42"></label>
    <label>行距 <input type="range" id="lineHeight" min="40" max="120" value="72"></label>
    <label>背景 <input type="color" id="bgColor" value="#000000"></label>
    <label>未播放 <input type="color" id="normalColor" value="#666666"></label>
    <label>播放中 <input type="color" id="activeColor" value="#ffffff"></label>
</div>

<div id="lyricsContainer">
    <div id="lyrics"></div>
</div>

<audio id="audio" controls></audio>

<script>
let lyricData = [];
const audio = document.getElementById("audio");
const lyricsDiv = document.getElementById("lyrics");

function centerLine(index = 0) {
    const lineHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--lineHeight"));
    const offset = (window.innerHeight / 2) - (index * lineHeight) - (lineHeight / 2);
    lyricsDiv.style.transform = `translateY(${offset}px)`;
}

// 載入音樂
document.getElementById("audioFile").onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    audio.src = URL.createObjectURL(file);
};

// 載入自訂字體
document.getElementById("fontFile").onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const font = new FontFace("UserFont", `url(${URL.createObjectURL(file)})`);
    await font.load();
    document.fonts.add(font);
    document.body.style.fontFamily = "UserFont";
};

// 載入LRC
document.getElementById("lrcFile").onchange = e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
        lyricData = [];
        lyricsDiv.innerHTML = "";
        const lines = reader.result.split(/\r?\n/);

        lines.forEach(line => {
            const match = line.match(/\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
            if (!match) return;
            lyricData.push({
                time: Number(match[1]) * 60 + Number(match[2]),
                text: match[3].trim()
            });
        });

        lyricData.sort((a, b) => a.time - b.time);

        lyricData.forEach(item => {
            const div = document.createElement("div");
            div.className = "line";
            div.textContent = item.text || "♪";
            lyricsDiv.appendChild(div);
        });

        // 不預先高亮歌詞，直接置中第一句
        centerLine(0);
    };
    reader.readAsText(file, "utf-8");
};

// 歌詞同步
audio.addEventListener("timeupdate", () => {
    let current = -1;

    // 尋找當前播放時間對應的歌詞索引
    for (let i = 0; i < lyricData.length; i++) {
        if (audio.currentTime >= lyricData[i].time) {
            current = i;
        }
    }

    const lines = document.querySelectorAll(".line");
    lines.forEach((line, index) => {
        line.classList.remove("active");
        if (current >= 0 && index === current) {
            line.classList.add("active");
        }
    });

    centerLine(current < 0 ? 0 : current);
});

// 控制面板事件綁定
document.getElementById("fontSize").oninput = e => {
    document.documentElement.style.setProperty("--fontSize", e.target.value + "px");
};

document.getElementById("lineHeight").oninput = e => {
    document.documentElement.style.setProperty("--lineHeight", e.target.value + "px");
};

document.getElementById("bgColor").oninput = e => {
    document.documentElement.style.setProperty("--bg", e.target.value);
    document.body.style.background = e.target.value;
};

document.getElementById("normalColor").oninput = e => {
    document.documentElement.style.setProperty("--normal", e.target.value);
};

document.getElementById("activeColor").oninput = e => {
    document.documentElement.style.setProperty("--active", e.target.value);
};

// 視窗大小改變時保持置中
window.addEventListener("resize", () => {
    const activeIndex = [...document.querySelectorAll(".line")].findIndex(line => line.classList.contains("active"));
    centerLine(activeIndex < 0 ? 0 : activeIndex);
});
</script>

</body>
</html>
